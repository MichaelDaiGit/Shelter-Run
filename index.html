<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<meta name="screen-orientation" content="landscape">
<meta name="description" content="8-bit runner game — reach the shelter before time runs out!">
<title>Shelter Run: Tel Aviv</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: monospace;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvas {
    display: block;
    background: #000;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
  }
  /* Rotate-your-device overlay — shown only in portrait via media query */
  #rotate-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 9999;
    background: #000;
    color: #fff;
    font-family: monospace;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #rotate-overlay .rotate-icon {
    font-size: 64px;
    animation: wobble 1.5s ease-in-out infinite;
  }
  #rotate-overlay p {
    font-size: 18px;
    text-align: center;
    opacity: 0.8;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-20deg); }
    75% { transform: rotate(20deg); }
  }
  @media (orientation: portrait) {
    #rotate-overlay { display: flex; }
    #canvas { display: none; }
  }
</style>
</head>
<body>
<div id="rotate-overlay">
  <div class="rotate-icon">📱</div>
  <p>Rotate your device<br>to landscape mode</p>
</div>
<canvas id="canvas"></canvas>
<script src="game.js"></script>
</body>
</html>
